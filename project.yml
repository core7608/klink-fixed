name: klink
options:
  bundleIdPrefix: app.klink
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0

targets:
  klink:
    type: application
    platform: iOS
    sources:
      - path: klink
        excludes:
          - "**/*.md"
          - "AlternateIcons/**"
          - "Assets.xcassets"
          - "GoogleService-Info.plist"
    # Explicit resource entries avoid double-processing by XcodeGen.
    # AlternateIcons is a folder reference so CFBundleAlternateIcons
    # subfolders + Previews stay intact for runtime icon switching.
    resources:
      - path: klink/Assets.xcassets
      - path: klink/GoogleService-Info.plist
      - path: klink/AlternateIcons
        type: folder
    info:
      path: klink/Info.plist
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.klink.mobile
        PRODUCT_NAME: klink
        INFOPLIST_FILE: klink/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
      - package: Firebase
        product: FirebaseCore
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
